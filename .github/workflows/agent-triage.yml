# The "real trigger": when CI fails on a PR, run the triage agent and post a
# structured report back. This is non-interactive agent execution — the agent
# reacts to a pipeline event, not a chat.
#
# Security posture:
#   - Least privilege: only pull-requests:write + contents:read.
#   - All untrusted values (PR number, branch) flow through env vars / files,
#     never interpolated into run: scripts (avoids command injection).
#   - The agent runs read-only (review mode); it cannot push or merge.
#   - A marker comment makes re-runs UPDATE instead of spamming new comments.
name: AI CI Triage

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  triage:
    # Only act when the CI run actually failed and came from a PR.
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install & build agent
        run: |
          npm ci
          npm run build

      - name: Check for Claude Code auth
        id: auth
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "No CLAUDE_CODE_OAUTH_TOKEN set — skipping live triage (see README to enable)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Claude Code CLI
        if: steps.auth.outputs.skip != 'true'
        run: npm i -g @anthropic-ai/claude-code

      - name: Resolve PR number (validated numeric)
        id: pr
        env:
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "No same-repo PR associated with this run; skipping." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Collect untrusted inputs (diff + failed log) to files
        if: steps.auth.outputs.skip != 'true' && steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          gh pr diff "$PR_NUMBER" --patch > pr.diff
          gh run view "$RUN_ID" --log-failed > ci.log || true

      - name: Run triage agent (read-only)
        if: steps.auth.outputs.skip != 'true' && steps.pr.outputs.skip != 'true'
        env:
          # Claude Code auth via a long-lived token (see `claude setup-token`).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          AGENT_MODEL: sonnet
        run: |
          node packages/agent-ci-triage/dist/cli.js \
            --diff pr.diff \
            --ci-log ci.log \
            --mode review \
            --max-budget-usd 0.50 \
            --out agent-out || echo "agent exit: $?"

      - name: Post or update PR comment (deduped)
        if: steps.auth.outputs.skip != 'true' && steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          MARKER="<!-- ai-ci-triage -->"
          printf '%s\n\n' "$MARKER" | cat - agent-out/report.md > body.md
          # Find an existing triage comment by marker and edit it in place;
          # otherwise create one. This is the anti-spam guardrail.
          ID=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)
          if [ -n "$ID" ]; then
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$ID" -F body=@body.md >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body-file body.md
          fi

      - name: Label escalations for a human
        if: steps.auth.outputs.skip != 'true' && steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          ACTION=$(jq -r '.final_action' agent-out/verdict.json 2>/dev/null || echo "")
          if [ "$ACTION" = "escalate" ]; then
            gh pr edit "$PR_NUMBER" --add-label "needs-human-review" || true
          fi
